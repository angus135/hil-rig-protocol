name: clang-format

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

jobs:
  clang-format-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check clang-format
        run: |
          set -euo pipefail

          SEARCH_DIRS=(
            "include"
            "src"
            "tests/c"
            "examples/c"
          )

          EXISTING_SEARCH_DIRS=()
          for dir in "${SEARCH_DIRS[@]}"; do
            if [ -d "$dir" ]; then
              EXISTING_SEARCH_DIRS+=("$dir")
            fi
          done

          if [ ${#EXISTING_SEARCH_DIRS[@]} -eq 0 ]; then
            echo "No source directories found, skipping clang-format check."
            exit 0
          fi

          mapfile -d '' FILES < <(
            find "${EXISTING_SEARCH_DIRS[@]}" -type f \( \
              -name "*.c"   -o \
              -name "*.cc"  -o \
              -name "*.cpp" -o \
              -name "*.cxx" -o \
              -name "*.h"   -o \
              -name "*.hh"  -o \
              -name "*.hpp" -o \
              -name "*.hxx" \
            \) -print0
          )

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No C/C++ source or header files found, skipping clang-format check."
            exit 0
          fi

          clang-format --dry-run --Werror "${FILES[@]}"
