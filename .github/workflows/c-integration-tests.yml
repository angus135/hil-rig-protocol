name: c-integration-tests

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DHIL_RIG_PROTOCOL_BUILD_TESTS=ON \
            -DHIL_RIG_PROTOCOL_BUILD_EXAMPLES=OFF \
            -DHIL_RIG_PROTOCOL_ENABLE_WARNINGS=ON \
            -DHIL_RIG_PROTOCOL_WARNINGS_AS_ERRORS=ON

      - name: Build integration tests
        run: |
          cmake --build build --target hil_rig_protocol_integration_tests --verbose

      - name: Run integration tests
        run: |
          ctest --test-dir build \
            --output-on-failure \
            -R '^hil_rig_protocol_integration_tests$'
